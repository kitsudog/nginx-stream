user  nginx;
worker_processes  auto;

error_log   /var/log/nginx/error.log notice;
pid         /var/run/nginx.pid;

events {
    worker_connections  10240;
}
http {
  resolver 8.8.8.8 valid=5 ipv6=off;
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"' [Proxy-pass=$upstream_addr];

  access_log  /var/log/nginx/access.log  main;
  sendfile        on;
  #tcp_nopush     on;
  charset 'utf-8';
  keepalive_timeout  65;
  # If we receive X-Forwarded-Proto, pass it through; otherwise, pass along the
  # scheme used to connect to this server
  map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
  }
  # If we receive X-Forwarded-Port, pass it through; otherwise, pass along the
  # server port the client connected to
  map $http_x_forwarded_port $proxy_x_forwarded_port {
    default $http_x_forwarded_port;
    ''      $server_port;
  }
  # If we receive Upgrade, set Connection to "upgrade"; otherwise, delete any
  # Connection header that may have been passed to this server
  map $http_upgrade $proxy_connection {
    default upgrade;
    '' close;
  }
  # Set appropriate X-Forwarded-Ssl header based on $proxy_x_forwarded_proto
  map $proxy_x_forwarded_proto $proxy_x_forwarded_ssl {
    default off;
    https on;
  }
  gzip_types text/plain text/css application/javascript application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript;
  # HTTP 1.1 support
  proxy_http_version 1.1;
  proxy_buffering off;
  proxy_set_header Host $http_host;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $proxy_connection;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
  proxy_set_header X-Forwarded-Ssl $proxy_x_forwarded_ssl;
  proxy_set_header X-Forwarded-Port $proxy_x_forwarded_port;
  proxy_set_header Proxy "";

  server {
    server_name _;
    server_tokens off;
    listen 80;
    return 503;
  }

  upstream LISTEN_1 {
    # for LISTEN_1=telegram.bee.com/manager:static-bee.bee-server/html/bee_telegram/@static.bee.com
    server static-bee.bee-server:80;
  }

  upstream LISTEN_2 {
    # for LISTEN_2=telegram.bee.com/config:static-bee.bee-server/html/bee_telegram/
    server static-bee.bee-server:80;
  }

  upstream LISTEN_103 {
    # for LISTEN=rancher.ops.bee404.com:172.31.162.186:8080@rancher.ops.bee404.com
    server 172.31.162.186:8080;
  }

  upstream LISTEN_104 {
    # for FORWARD_1=telegram.bee.com/config/:static-bee.bee-server
    server static-bee.bee-server:80;
  }


  server {
    listen 80;
    server_name telegram.bee.com;
    ssl_verify_client off;
    
    location /manager {
      add_header FROM nginx-stream;
      proxy_set_header Host static.bee.com;
      proxy_set_header X-FROM telegram.bee.com;
      proxy_pass http://static-bee.bee-server:80/html/bee_telegram/;
      proxy_redirect default;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $proxy_connection;
    }
    location /config {
      add_header FROM nginx-stream;
      proxy_set_header Host $proxy_host;
      proxy_set_header X-FROM telegram.bee.com;
      proxy_pass http://static-bee.bee-server:80/html/bee_telegram/;
      proxy_redirect default;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $proxy_connection;
    }
    location /config/ {
      add_header FROM nginx-stream;
      proxy_set_header Host $http_host;
      proxy_set_header X-FROM telegram.bee.com;
      proxy_pass http://static-bee.bee-server:80/config/;
      proxy_redirect default;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $proxy_connection;
    }
  }

  server {
    listen 80;
    server_name rancher.ops.bee404.com;
    ssl_verify_client off;
    
    location / {
      add_header FROM nginx-stream;
      proxy_set_header Host rancher.ops.bee404.com;
      proxy_set_header X-FROM rancher.ops.bee404.com;
      proxy_pass http://172.31.162.186:8080/;
      proxy_redirect default;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $proxy_connection;
    }
  }

}

stream {
  log_format proxy '$remote_addr [$time_local] '
                 '$protocol $status $bytes_sent $bytes_received '
                 '$session_time -> $upstream_addr '
                 '$upstream_bytes_sent $upstream_bytes_received $upstream_connect_time';
  access_log /var/log/nginx/access.log proxy buffer=32k;
  open_log_file_cache off;

  server {
    listen 1194 udp;
    proxy_connect_timeout 3s;
    proxy_timeout 10s;
    proxy_pass 47.242.30.239:1194;
  }

}
